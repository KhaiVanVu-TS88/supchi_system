# ===== DOCKER COMPOSE v3.2 — optimized =====

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supchi4-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=${SECRET_KEY:-supchi4-change-in-production}
      - DATABASE_URL=sqlite:////data/supchi4.db
      - REDIS_URL=redis://localhost:6379/0
      - FRONTEND_URL=http://localhost:3000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HF_ENDPOINT=https://hf-mirror.com
      - DEBUG=false
      - HTTP_PROXY=http://172.25.80.1:7897
      - HTTPS_PROXY=http://172.25.80.1:7897
      - http_proxy=http://172.25.80.1:7897
      - https_proxy=http://172.25.80.1:7897
      - NO_PROXY=localhost,127.0.0.1,backend,worker
      - no_proxy=localhost,127.0.0.1,backend,worker
      # EasyOCR lưu model cache vào volume (không tải lại mỗi restart)
      - EASYOCR_MODULE_PATH=/easyocr_models
    volumes:
      - whisper_cache:/root/.cache/huggingface
      - sqlite_data:/data
      - easyocr_cache:/easyocr_models   # ← cache EasyOCR model
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        limits:    { memory: 2G }        # Tăng lên vì EasyOCR cần thêm RAM
        reservations: { memory: 512M }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supchi4-worker
    command: >
      bash -c "
        sleep 15 &&
        celery -A worker.celery_app worker
        --loglevel=info
        --concurrency=1
        --max-tasks-per-child=10
      "
    environment:
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=${SECRET_KEY:-supchi4-change-in-production}
      - DATABASE_URL=sqlite:////data/supchi4.db
      - REDIS_URL=redis://backend:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HF_ENDPOINT=https://hf-mirror.com
      - HTTP_PROXY=http://172.25.80.1:7897
      - HTTPS_PROXY=http://172.25.80.1:7897
      - http_proxy=http://172.25.80.1:7897
      - https_proxy=http://172.25.80.1:7897
      - NO_PROXY=localhost,127.0.0.1,backend,worker
      - no_proxy=localhost,127.0.0.1,backend,worker
    volumes:
      - whisper_cache:/root/.cache/huggingface
      - sqlite_data:/data
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        limits:    { memory: 4G }
        reservations: { memory: 1G }

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supchi4-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  sqlite_data:
  whisper_cache:
  easyocr_cache:     # ← EasyOCR model cache