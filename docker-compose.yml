# ===== DOCKER COMPOSE v2 =====
# Hệ thống đầy đủ: Frontend + Backend + Database
#
# Khởi động: docker compose up --build
# Dừng:      docker compose down
# Xoá data:  docker compose down -v

services:

  # ════════════════════════════════════════
  #  DATABASE — PostgreSQL
  #  (Dùng SQLite mặc định nếu không muốn PostgreSQL)
  # ════════════════════════════════════════
  db:
    image: postgres:16-alpine
    container_name: supchi4-db
    environment:
      POSTGRES_DB:       supchi4
      POSTGRES_USER:     supchi4
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supchi4pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supchi4"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ════════════════════════════════════════
  #  BACKEND — FastAPI + Auth + Whisper
  #  http://localhost:8000
  #  http://localhost:8000/docs
  # ════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supchi4-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      # JWT — ĐỔI SECRET_KEY trước khi deploy!
      - SECRET_KEY=${SECRET_KEY:-supchi4-change-this-secret-in-production}
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - REFRESH_TOKEN_EXPIRE_DAYS=30
      # Database — PostgreSQL
      - DATABASE_URL=postgresql://supchi4:${DB_PASSWORD:-supchi4pass}@db:5432/supchi4
      # Hoặc dùng SQLite (bỏ comment dòng dưới, comment dòng trên):
      # - DATABASE_URL=sqlite:///./supchi4.db
      - FRONTEND_URL=http://localhost:3000
      - DEBUG=false
    volumes:
      - whisper_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        limits:    { memory: 4G }
        reservations: { memory: 1G }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ════════════════════════════════════════
  #  FRONTEND — Next.js
  #  http://localhost:3000
  # ════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supchi4-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        limits:    { memory: 512M }
        reservations: { memory: 256M }

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  whisper_cache:
    driver: local