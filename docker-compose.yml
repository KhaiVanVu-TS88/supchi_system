# ===== DOCKER COMPOSE — ROOT =====
# Khởi động toàn bộ hệ thống bằng 1 lệnh:
#   docker compose up --build
#
# Dừng:
#   docker compose down
#
# Xem log realtime:
#   docker compose logs -f
#
# Chỉ chạy backend:
#   docker compose up backend

services:

  # ════════════════════════════════════════
  #  BACKEND — FastAPI + Whisper AI
  #  http://localhost:8000
  #  http://localhost:8000/docs  ← Swagger UI
  # ════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supchi4-backend
    ports:
      - "8000:8000"
    volumes:
      # Cache Whisper model qua các lần restart (tránh download lại)
      - whisper_cache:/root/.cache/huggingface
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 4G       # Whisper cần ~1.5GB, tổng pipeline ~3GB
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ════════════════════════════════════════
  #  FRONTEND — Next.js + TypeScript
  #  http://localhost:3000
  # ════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supchi4-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # URL backend dùng nội bộ Docker network (tên service)
      - BACKEND_URL=http://backend:8000
      # URL backend cho browser (public)
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy   # Chờ backend healthy trước
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

# ════════════════════════════════════════
#  SHARED RESOURCES
# ════════════════════════════════════════
networks:
  app-network:
    driver: bridge

volumes:
  whisper_cache:
    driver: local